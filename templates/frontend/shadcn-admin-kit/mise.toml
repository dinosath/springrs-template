[tools]
node = '24'
pnpm = "latest"

[tasks.dev]
description = "Run frontend dev server (proxied to mockserver)"
run = '''
# Start mockserver if not already running on port 1080
if ! nc -z localhost 1080 2>/dev/null; then
  echo "Starting mockserver..."
  docker-compose --profile mock up -d mockserver
  for i in $(seq 1 30); do
    if nc -z localhost 1080 2>/dev/null; then echo "Mockserver ready"; break; fi
    sleep 1
  done
fi
pnpm install --no-frozen-lockfile
VITE_MOCK=true pnpm run dev
'''

[tasks.build]
description = "Build frontend"
run = '''
pnpm install --no-frozen-lockfile
pnpm run test
pnpm run build
'''

[tasks.default]
description = "Default task: build frontend"
run = { task = "build" }