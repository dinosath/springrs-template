[tools]
"github:aliev/baker" = "latest"

[env]
MISE_TRUSTED_CONFIG_PATHS = "$PWD/generated"

[tasks.generate]
description = "Generate the project files"
run = "baker . ./generated/$ANSWER --answers-file samples/answers-$ANSWER.json --force --non-interactive --skip-confirms all"

[tasks.e2e]
description = "Run e2e tests"
run = "(cd generated/$ANSWER && mise run build-and-test)"

[tasks.test]
description = "Run tests"
run = "(cd generated/$ANSWER && mise run test)"

[tasks.rest]
description = "Generate and build rest sample"
env.ANSWER = "rest"
run = [{ task = "generate"},{ task = "e2e" }]


[tasks.rest-jwt]
description = "Generate and build rest-jwt sample"
env.ANSWER = "rest-jwt"
run = [{ task = "generate"},{ task = "e2e" }]

[tasks.rest-shadcn]
description = "Generate and build rest-shadcn sample"
env.ANSWER = "rest-shadcn"
run = [{ task = "generate"},{ task = "e2e" }]

[tasks.rest-leptos]
description = "Generate and build rest-leptos sample (Leptos WASM frontend)"
env.ANSWER = "rest-leptos"
run = [{ task = "generate"},{ task = "e2e" }]

[tasks.grpc]
description = "Generate and build grpc sample"
env.ANSWER = "grpc"
run = [{ task = "generate"},{ task = "e2e" }]

[tasks.rest-rls]
description = "Generate and build rest sample with Row-Level Security"
env.ANSWER = "rest-rls"
run = [{ task = "generate"},{ task = "test" }]

[tasks.all]
description = "Generate and build all samples"
depends = ["rest", "rest-jwt", "rest-shadcn", "rest-leptos", "grpc", "rest-rls"]